name: transaction-service

on:
  push:
    branches: [ main ]
    paths:
      - 'transaction-service/**'
      - '.github/workflows/transaction-service.yml'
  pull_request:
    paths:
      - 'transaction-service/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transaction-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: transaction-service-test-results
          path: transaction-service/build/reports/tests/
