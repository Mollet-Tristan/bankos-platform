spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://localhost:5432/bankos_accounts
    username: ${DB_USERNAME:bankos}
    password: ${DB_PASSWORD:bankos}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages the schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all          # Wait for all in-sync replicas
      retries: 3
      properties:
        enable.idempotence: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak JWKS endpoint — replace realm name as needed
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/bankos/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/bankos}

server:
  port: 8081
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.bankos: DEBUG
    org.springframework.security: INFO
