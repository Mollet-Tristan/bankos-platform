---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: bankos
  labels:
    app: notification-service
    app.kubernetes.io/part-of: bankos-platform
spec:
  # Notification service: fewer replicas needed.
  # It is stateless and non-critical to the payment path.
  # Kafka consumer group rebalances automatically on replica count change.
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1   # Can tolerate 1 pod down — Kafka retains events
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: notification-service
          image: bankos/notification-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notification-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-db-credentials
                  key: password
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: bankos-config
                  key: notification-service.datasource-url
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: bankos-config
                  key: kafka.bootstrap-servers
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: host
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: port
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: username
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-credentials
                  key: password
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: bankos
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
# Notification service runs as a CronJob for the retry scheduler
# if we want to decouple the retry from the main pod lifecycle.
# Currently the @Scheduled annotation handles this inline.
# Documented here as a future evolution path.
# apiVersion: batch/v1
# kind: CronJob ...
