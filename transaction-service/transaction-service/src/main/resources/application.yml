spring:
  application:
    name: transaction-service

  datasource:
    url: jdbc:postgresql://localhost:5432/bankos_transactions
    username: ${DB_USERNAME:bankos}
    password: ${DB_PASSWORD:bankos}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: transaction-service-account-events
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false  # Manual acknowledgment for reliability
    listener:
      ack-mode: manual_immediate

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/bankos/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/bankos}

server:
  port: 8082
  error:
    include-message: always

# ── Downstream service URLs ────────────────────────────────────────────────────
bankos:
  account-service:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}

# ── Resilience4j ──────────────────────────────────────────────────────────────
# ADR-003: Circuit breaker for Account Service HTTP calls.
# If the Account Service is degraded, we fail fast rather than exhausting
# our own thread pool waiting for timeouts.
resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-size: 10
        failure-rate-threshold: 50          # open after 50% failures over 10 calls
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80
  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientRequestException
        ignore-exceptions:
          - com.bankos.transaction.domain.port.InsufficientFundsRemoteException
          - com.bankos.transaction.domain.port.AccountFrozenRemoteException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.bankos: DEBUG
    io.github.resilience4j: INFO
